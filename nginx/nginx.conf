# =============================================================
#  Reverse Proxy Nginx - Gestion de Stages
#  Point d'entrée unique de l'application.
#
#  Utilisateur ──► NGINX (port 80)
#                   ├── /      ──► conteneur "frontend" (Angular)
#                   └── /api/  ──► conteneur "backend"  (Express)
# =============================================================

# Nombre de process worker (auto = 1 par cœur CPU disponible).
worker_processes auto;

events {
    # Nombre max de connexions simultanées par worker.
    worker_connections 1024;
}

http {
    # Charge les types MIME (text/css, application/javascript, image/png...)
    # sans quoi le navigateur téléchargerait les fichiers au lieu de les afficher.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimisations d'envoi de fichiers statiques.
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Compression gzip : réduit la taille des réponses (JS/CSS/JSON).
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length   256;

    # -----------------------------------------------------------------
    #  "upstream" = groupe de serveurs cibles.
    #  Les noms "frontend" et "backend" sont les NOMS DE SERVICE Docker :
    #  le DNS interne de Docker les résout automatiquement vers l'IP
    #  du conteneur correspondant sur le réseau partagé.
    # -----------------------------------------------------------------
    upstream frontend_upstream {
        server frontend:80;
    }

    upstream backend_upstream {
        server backend:5000;
    }

    server {
        # Nginx écoute sur le port 80 À L'INTÉRIEUR du conteneur.
        listen 80;
        server_name _;   # répond à n'importe quel nom d'hôte.

        # Taille max des uploads (le backend gère des fichiers via /uploads).
        client_max_body_size 20m;

        # -------------------------------------------------------------
        #  ROUTE API  ──►  Backend Express
        #  Tout ce qui commence par /api/ est transféré au backend.
        #  IMPORTANT : pas de "/" final après le port, donc le préfixe
        #  /api/ est CONSERVÉ (le backend attend bien /api/...).
        # -------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend_upstream;

            # En-têtes transmis au backend pour qu'il connaisse
            # le vrai client et le protocole d'origine.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support WebSocket / connexions maintenues (si besoin plus tard).
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # -------------------------------------------------------------
        #  ROUTE FRONTEND  ──►  Angular
        #  Tout le reste (/, /login, /offers, assets...) va au frontend.
        # -------------------------------------------------------------
        location / {
            proxy_pass http://frontend_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

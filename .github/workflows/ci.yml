name: CI - Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        run: npm ci

      - name: Vérifier la syntaxe du backend
        run: node --check app.js

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        run: npm ci

      - name: Compiler Angular
        run: npm run build

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construire et publier le backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-stage-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-stage-backend:${{ github.sha }}

      - name: Construire et publier le frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-stage-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestion-stage-frontend:${{ github.sha }}
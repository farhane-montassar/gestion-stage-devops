name: CI - Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        run: npm ci

      - name: Vérifier la syntaxe du backend
        run: node --check app.js

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Installer Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances frontend
        run: npm ci

      - name: Compiler Angular
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construire l'image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: gestion-stage-backend:ci

      - name: Construire l'image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: gestion-stage-frontend:ci
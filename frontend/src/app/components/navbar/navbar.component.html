<header class="navbar">
  <h3 class="navbar-title">Gestion des stages</h3>

  <div class="navbar-actions">
    <!-- Centre de notifications -->
    <div class="notif">
      <button
        type="button"
        class="bell-btn"
        (click)="toggleDropdown()"
        aria-label="Notifications"
      >
        🔔
        <span class="notif-count" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>

      <!-- Overlay pour fermer au clic extérieur -->
      <div class="notif-overlay" *ngIf="showDropdown" (click)="closeDropdown()"></div>

      <div class="notif-dropdown" *ngIf="showDropdown">
        <div class="notif-header">
          <span>Notifications</span>
          <button
            type="button"
            class="mark-all"
            *ngIf="unreadCount > 0"
            (click)="markAllAsRead()"
          >
            Tout marquer comme lu
          </button>
        </div>

        <div class="notif-list">
          <div
            class="notif-item"
            *ngFor="let n of notifications"
            [class.unread]="!n.read"
            (click)="markAsRead(n)"
          >
            <span class="notif-icon">{{ iconFor(n.type) }}</span>
            <div class="notif-body">
              <span class="notif-item-title">{{ n.title }}</span>
              <span class="notif-message">{{ n.message }}</span>
              <span class="notif-date">{{ n.createdAt | date: 'dd/MM/yyyy HH:mm' }}</span>
            </div>
            <span class="unread-dot" *ngIf="!n.read"></span>
          </div>

          <div class="notif-empty" *ngIf="notifications.length === 0">
            Aucune notification
          </div>
        </div>
      </div>
    </div>

    <div class="user-info" *ngIf="user">
      <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
      <span class="user-badge">{{ roleLabel }}</span>
    </div>

    <button type="button" class="logout-btn" (click)="logout()">
      <span class="logout-icon">⏻</span>
      Déconnexion
    </button>
  </div>
</header>
